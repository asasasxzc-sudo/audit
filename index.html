<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YMTEA Labs - 全球独立站 GEO/SEO 深度审计专家</title>
    <style>
        :root { --primary: #c2410c; --secondary: #1e293b; --bg: #f4f7f9; --card-bg: #ffffff; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--secondary); margin: 0; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* 侧边栏：微信 + WhatsApp */
        .sidebar-contact { position: fixed; right: 25px; bottom: 80px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .side-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transition: 0.3s; }
        .side-btn:hover { transform: scale(1.1); }

        header { text-align: center; padding: 70px 20px; background: white; border-bottom: 1px solid #e2e8f0; }
        .logo-text { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        
        .search-section { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); margin: -50px auto 30px; border: 1px solid #e2e8f0; }
        .input-group { display: flex; gap: 10px; }
        input[type="url"] { flex: 1; padding: 18px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 16px; outline: none; }
        #auditBtn { background: var(--primary); color: white; border: none; padding: 0 35px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        /* 进度条与文字 */
        .progress-container { margin: 30px 0; display: none; }
        #progressStatus { text-align: center; font-size: 14px; color: #64748b; margin-bottom: 8px; font-weight: 600; }
        .progress-line { height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        #progressFill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s; }

        /* 结果展示 */
        #reportSection { display: none; margin-top: 40px; animation: fadeIn 0.5s ease; }
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .metric-card { background: white; padding: 25px; border-radius: 20px; border-top: 5px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.02); text-align: center; }
        .metric-value { font-size: 2.2rem; font-weight: 800; color: var(--secondary); margin: 10px 0; }
        
        /* 机器人准入标签 */
        .bot-grid { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .bot-tag { padding: 8px 20px; border-radius: 50px; font-size: 13px; font-weight: 700; background: #f1f5f9; border: 1px solid #e2e8f0; }
        .bot-tag.allow { color: var(--success); border-color: var(--success); background: #f0fdf4; }
        .bot-tag.deny { color: var(--danger); border-color: var(--danger); background: #fef2f2; }

        .llm-expert-box { background: #1e293b; color: #f8fafc; padding: 30px; border-radius: 24px; margin-top: 30px; }
        #llmContent { font-family: monospace; font-size: 14px; white-space: pre-wrap; line-height: 1.7; }

        .consult-box { background: var(--primary); color: white; padding: 50px; border-radius: 30px; text-align: center; margin: 60px 0; }
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .btn-white { background: white; color: var(--primary); padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 800; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="sidebar-contact">
    <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" class="side-btn" style="background:#07c160;">微</a>
    <a href="https://wa.me/8618066947375" class="side-btn" style="background:#25d366;">W</a>
</div>

<header>
    <div class="container">
        <div class="logo-text">YMTEA Labs</div>
        <p>全球独立站 SEO 审计 & AI 搜索 (GEO) 性能基准测试</p>
    </div>
</header>

<div class="container">
    <div class="search-section">
        <div class="input-group">
            <input type="url" id="siteUrl" placeholder="输入待测网址 (如: ymtea.club)">
            <button id="auditBtn" onclick="runExpertAudit()">启动审计</button>
        </div>
        <div style="margin-top:20px; text-align:center; font-size:14px; color:#64748b;">
            快速链接: 
            <a href="https://ymtea.club" target="_blank" style="color:var(--primary); margin:0 10px; text-decoration:none;">Ymtea Shop</a> | 
            <a href="https://vip.ymtea.club" target="_blank" style="color:var(--primary); margin:0 10px; text-decoration:none;">VIP智库</a>
        </div>
    </div>

    <!-- 进度条与提示文字找回 -->
    <div class="progress-container" id="pContainer">
        <div id="progressStatus">准备建立安全连接...</div>
        <div class="progress-line"><div id="progressFill"></div></div>
    </div>

    <div id="reportSection">
        <div class="metric-grid">
            <div class="metric-card"><div>SEO/GEO 权重</div><div id="m-seo" class="metric-value">--</div><div>综合排名潜力</div></div>
            <div class="metric-card"><div>首屏加载 (LCP)</div><div id="m-lcp" class="metric-value">--</div><div>核心交互耗时</div></div>
            <div class="metric-card"><div>视觉稳定性 (CLS)</div><div id="m-cls" class="metric-value">--</div><div>页面布局抖动</div></div>
            <div class="metric-card"><div>总资源负载</div><div id="m-weight" class="metric-value">--</div><div>站点轻量化程度</div></div>
        </div>

        <!-- 机器人准入情况找回 -->
        <div style="margin-top:30px; text-align:center;">
            <h3>🤖 AI 搜索引擎爬虫 (Bots) 准入状态</h3>
            <div class="bot-grid" id="botStatusGrid"></div>
        </div>

        <div class="llm-expert-box">
            <h3 style="color:var(--success); margin-top:0;">📋 专家级 LLMS 诊断建议</h3>
            <pre id="llmContent">分析中...</pre>
            <div style="text-align:right; margin-top:15px;">
                <button onclick="downloadLog()" style="background:#475569; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer;">导出审计报告</button>
            </div>
        </div>

        <div class="consult-box">
            <h2>需要针对性的一对一技术方案？</h2>
            <p>联系 YMTEA 技术顾问，获取深度的 WordPress/Cloudflare 性能调优建议</p>
            <div class="btn-group">
                <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" class="btn-white">微信咨询</a>
                <a href="https://wa.me/8618066947375" class="btn-white" style="background:#25d366; color:white;">WhatsApp</a>
            </div>
        </div>
    </div>
</div>

<script>
    let reportData = "";
    const statusMsgs = ["正在初始化全球节点...", "正在模拟 AI 爬虫抓取...", "正在调用 Lighthouse 核心审计...", "正在生成 LLM 专家建议...", "报告汇总中..."];

    async function runExpertAudit() {
        let url = document.getElementById('siteUrl').value.trim();
        if(!url) return alert('请输入网址');
        if(!url.startsWith('http')) url = 'https://' + url;

        const btn = document.getElementById('auditBtn');
        const report = document.getElementById('reportSection');
        const pContainer = document.getElementById('pContainer');
        const pFill = document.getElementById('progressFill');
        const pStatus = document.getElementById('progressStatus');

        btn.disabled = true;
        report.style.display = 'none';
        pContainer.style.display = 'block';
        
        let sIdx = 0;
        const sTimer = setInterval(() => {
            pStatus.innerText = statusMsgs[sIdx % statusMsgs.length];
            pFill.style.width = (sIdx + 1) * 15 + "%";
            sIdx++;
        }, 1200);

        try {
            const res = await fetch(`https://pi.ymtea.club/?url=${encodeURIComponent(url)}`, {
                headers: { 'X-Auth-Token': 'YmTea_Labs_2026_Secure' }
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error);

            clearInterval(sTimer);
            pFill.style.width = "100%";
            pStatus.innerText = "审计完成！";

            // 填数据
            document.getElementById('m-seo').innerText = data.seo;
            document.getElementById('m-lcp').innerText = data.lcp + "s";
            document.getElementById('m-cls').innerText = data.cls;
            document.getElementById('m-weight').innerText = data.totalByteWeight + " KB";
            document.getElementById('llmContent').innerText = data.llmsText;
            reportData = data.llmsText;

            // 机器人准入
            const bGrid = document.getElementById('botStatusGrid');
            const bots = [{k:'gpt', n:'GPTBot'}, {k:'claude', n:'ClaudeBot'}, {k:'pplx', n:'Perplexity'}, {k:'google', n:'GoogleBot'}];
            bGrid.innerHTML = bots.map(b => `
                <div class="bot-tag ${data.bots[b.k] ? 'allow' : 'deny'}">
                    ${b.n}: ${data.bots[b.k] ? '允许抓取' : '禁止访问'}
                </div>
            `).join('');

            setTimeout(() => {
                pContainer.style.display = 'none';
                report.style.display = 'block';
                btn.disabled = false;
            }, 600);

        } catch (e) {
            clearInterval(sTimer);
            alert('审计异常: ' + e.message);
            btn.disabled = false;
            pContainer.style.display = 'none';
        }
    }

    function downloadLog() {
        const blob = new Blob([reportData], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `YMTEA_Audit_Report.txt`;
        a.click();
    }
</script>
</body>
</html>
