<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEO & 性能深度诊断 - YMTEA Labs</title>
    <style>
        :root {
            --primary: #c2410c; 
            --secondary: #2c3e50;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --content-width: 1140px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--secondary);
            margin: 0; padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: var(--content-width); margin: 0 auto; padding: 15px; }

        header {
            text-align: center;
            padding: 40px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }

        header h1 { font-size: 1.8rem; margin: 0; letter-spacing: -1px; }
        header p { color: #64748b; margin-top: 10px; font-size: 0.9rem; }

        .search-section {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 20px -5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: -30px auto 10px;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .search-section { flex-direction: row; padding: 35px; margin-top: -50px; }
        }

        input[type="url"] {
            flex: 1;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        #auditBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        #auditBtn:disabled { background: #94a3b8; cursor: wait; }

        #progressContainer {
            display: none;
            margin: 20px auto;
            text-align: center;
        }
        .progress-bar-bg { background: #e2e8f0; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        #progressBarFill { background: var(--primary); height: 100%; width: 0%; transition: width 0.4s ease; }

        #reportSection { display: none; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary);
        }

        .score-val { font-size: 1.8rem; font-weight: 800; display: block; margin: 8px 0; }
        .label { color: #94a3b8; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .geo-detail-box {
            background: white; padding: 25px; border-radius: 20px;
            margin-top: 20px; border: 1px solid #e2e8f0;
        }

        /* LLMS 报告区域样式修正 */
        .llms-txt-area {
            background: #0f172a; 
            color: #38bdf8; 
            padding: 15px; 
            border-radius: 10px;
            font-family: 'Courier New', monospace; 
            font-size: 12px; 
            position: relative; 
            margin-top: 15px;
            
            /* 🚀 核心修复：强制换行逻辑 */
            white-space: pre-wrap;       /* 保持换行符，但允许自动折行 */
            word-wrap: break-word;       /* 兼容老版本浏览器 */
            word-break: break-all;       /* 确保长内容在中途断开 */
            
            min-height: 120px;
            border: 1px solid #334155;
            overflow-x: hidden;          /* 彻底杜绝横向滚动 */
        }

        .copy-btn { position: absolute; top: 10px; right: 10px; background: #334155; color: #fff; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; z-index: 5; }

        .opp-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #f1f5f9; gap: 10px;
        }

        .bot-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin: 20px 0; }
        .bot-item { padding: 10px; background: #f8fafc; border-radius: 8px; display: flex; justify-content: space-between; font-weight: 600; font-size: 12px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>YMTEA Labs 诊断专家</h1>
        <p>独立站 SEO 审计 & AI 搜索 (GEO) 深度优化方案</p>
    </div>
</header>

<div class="container">
    <div class="search-section">
        <input type="url" id="siteUrl" placeholder="输入网址，例如 https://www.ymtea.club" required>
        <button id="auditBtn" onclick="runComprehensiveAudit()">开始深度审计</button>
    </div>

    <div id="progressContainer">
        <div class="progress-bar-bg"><div id="progressBarFill"></div></div>
        <div id="statusText">准备启动诊断引擎...</div>
    </div>

    <div id="reportSection">
        <div class="report-grid">
            <div class="card"><div class="label">性能评分</div><span id="pScore" class="score-val">--</span></div>
            <div class="card"><div class="label">加载速度 (LCP)</div><span id="lcpVal" class="score-val">--</span></div>
            <div class="card"><div class="label">AI 兼容评分 (GEO)</div><span id="geoScore" class="score-val">--</span></div>
        </div>

        <div class="geo-detail-box" style="border-top: 5px solid var(--danger);">
            <h3 style="margin-top:0; font-size: 1.1rem;">⚡ 性能改进机会</h3>
            <div id="oppList"></div>
            <p id="ttfbText" style="font-size: 12px; color: #64748b; margin-top: 15px;"></p>

            <!-- 实时链路与资源审计 -->
            <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #e2e8f0;">
                <h3 style="margin-top:0; font-size: 1.1rem;">🔍 实时链路与资源审计</h3>
                <div class="report-grid" style="grid-template-columns: repeat(2, 1fr); margin-top: 15px;">
                    <div style="text-align: left; padding: 12px; background: #f8fafc; border-radius: 10px;">
                        <div class="label" style="font-size: 0.6rem;">资源总重</div>
                        <span id="totalWeight" style="font-weight: bold;">检测中...</span>
                    </div>
                    <div style="text-align: left; padding: 12px; background: #f8fafc; border-radius: 10px;">
                        <div class="label" style="font-size: 0.6rem;">SEO 状态</div>
                        <span id="seoTagStatus" style="font-weight: bold; color: #10b981;">检测中...</span>
                    </div>
                </div>
                <div id="realtimeAnalysis" style="font-size: 13px; color: #475569; margin-top: 12px; padding: 12px; border-radius: 8px; background: #f1f5f9; border-left: 4px solid #3b82f6;">
                    正在解析页面架构...
                </div>
            </div>
        </div>

        <div class="geo-detail-box">
            <h3 style="margin-top:0; font-size: 1.1rem;">🤖 AI 机器人准入检测</h3>
            <div class="bot-list" id="botList"></div>

            <h4 style="margin-bottom:10px;">📄 行业定制 LLMS.txt 报告</h4>
            <!-- 🚀 这里的 pre 标签也同步应用了换行逻辑 -->
            <div class="llms-txt-area">
                <button class="copy-btn" onclick="copyLlms()">复制</button>
                <pre id="llmsCode" style="margin:0; white-space: pre-wrap; word-break: break-all;">报告生成中...</pre>
            </div>
        </div>
    </div>
</div>

<script>
    async function runComprehensiveAudit() {
        const urlInput = document.getElementById('siteUrl');
        const btn = document.getElementById('auditBtn');
        const report = document.getElementById('reportSection');
        const progress = document.getElementById('progressContainer');
        const fill = document.getElementById('progressBarFill');
        
        let targetUrl = urlInput.value.trim();
        if(!targetUrl) return alert('请输入网址');
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;

        btn.disabled = true;
        report.style.display = 'none';
        progress.style.display = 'block';
        fill.style.width = '30%';
        document.getElementById('statusText').innerText = '正在调取 Google 核心指标...';

        try {
            const response = await fetch(`https://pi.ymtea.club/?url=${encodeURIComponent(targetUrl)}`, {
                headers: { 'X-Auth-Token': 'YmTea_Labs_2026_Secure' }
            });

            const data = await response.json();
            fill.style.width = '100%';
            
            // 渲染分数与基础数据
            document.getElementById('pScore').innerText = data.perfScore;
            document.getElementById('pScore').style.color = data.perfScore > 80 ? "#10b981" : "#ef4444";
            document.getElementById('lcpVal').innerText = data.lcp;
            document.getElementById('geoScore').innerText = data.geoScore;
            document.getElementById('totalWeight').innerText = data.totalSize;
            document.getElementById('seoTagStatus').innerText = data.seoScore > 85 ? "符合标准" : "待优化";

            // 渲染改进机会
            document.getElementById('oppList').innerHTML = (data.opportunities || []).map(opp => `
                <div class="opp-item">
                    <span style="font-weight: 600; font-size: 13px;">📍 ${opp.title}</span>
                    <span style="background: #fee2e2; color: #ef4444; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold;">${opp.savings}</span>
                </div>
            `).join('');

            // 机器人与 LLMS 文本
            const b = data.bots || {};
            document.getElementById('botList').innerHTML = `
                <div class="bot-item">GPTBot <span>${b.gpt?'✅':'❌'}</span></div>
                <div class="bot-item">Claude <span>${b.claude?'✅':'❌'}</span></div>
                <div class="bot-item">Google <span>${b.google?'✅':'❌'}</span></div>
            `;
            document.getElementById('llmsCode').innerText = data.llmsText;

            // 专家分析语
            const analysisBox = document.getElementById('realtimeAnalysis');
            analysisBox.innerHTML = data.perfScore >= 80 ? 
                "🎯 <strong>专家点评：</strong> 站点架构极佳，核心资源已实现按需加载。" : 
                "🚩 <strong>核心风险：</strong> 检测到阻塞级资源，建议优化脚本执行优先级。";

            setTimeout(() => {
                progress.style.display = 'none';
                report.style.display = 'block';
            }, 500);

        } catch (e) {
            alert('诊断中断: ' + e.message);
        } finally {
            btn.disabled = false;
        }
    }

    function copyLlms() {
        const code = document.getElementById('llmsCode').innerText;
        navigator.clipboard.writeText(code).then(() => alert('已复制到剪贴板'));
    }
</script>
</body>
</html>
