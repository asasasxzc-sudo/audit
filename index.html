<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEO & Lighthouse 性能深度诊断 - YMTEA Labs</title>
    <style>
        :root { --primary: #c2410c; --secondary: #1e293b; --bg: #f8fafc; --card-bg: #ffffff; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--secondary); margin: 0; line-height: 1.6; }
        .container { max-width: 1140px; margin: 0 auto; padding: 15px; }
        header { text-align: center; padding: 50px 20px; background: #fff; border-bottom: 1px solid #e2e8f0; }
        header h1 { font-size: 1.8rem; margin: 0; }
        header p { color: #64748b; font-size: 0.95rem; margin-top: 10px; }
        
        .search-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); margin: -40px auto 10px; position: relative; z-index: 10; border: 1px solid #e2e8f0; }
        .search-controls { display: flex; flex-direction: column; gap: 12px; }
        @media (min-width: 768px) { .search-controls { flex-direction: row; } }
        
        input[type="url"] { flex: 1; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; }
        #auditBtn { background: var(--primary); color: white; border: none; padding: 16px 30px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        #auditBtn:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* 恢复导航链接样式 */
        .sub-nav { display: flex; justify-content: center; gap: 25px; margin-top: 15px; font-size: 14px; }
        .sub-nav a { color: #64748b; text-decoration: none; font-weight: 600; }
        .sub-nav a:hover { color: var(--primary); text-decoration: underline; }

        #progressContainer { display: none; margin: 20px auto; text-align: center; }
        .progress-bar-bg { background: #e2e8f0; height: 10px; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        #progressBarFill { background: var(--primary); height: 100%; width: 0%; transition: width 0.4s ease; }
        
        #reportSection { display: none; animation: slideUp 0.6s ease; }
        .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 16px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        .score-val { font-size: 2.2rem; font-weight: 800; display: block; margin: 8px 0; }
        .label { color: #64748b; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; }

        .geo-detail-box { background: white; padding: 25px; border-radius: 20px; margin-top: 20px; border: 1px solid #e2e8f0; }
        .opp-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f1f5f9; }
        .opp-savings { background: #fee2e2; color: #ef4444; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        .bot-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 20px 0; }
        .bot-item { padding: 15px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; display: flex; justify-content: space-between; font-weight: 600; font-size: 14px; }

        .advisor-section { text-align: center; margin: 40px 0; background: white; padding: 45px 20px; border-radius: 24px; border: 1px solid #f1f5f9; }
        .btn-cta { padding: 16px 30px; border-radius: 50px; text-decoration: none; font-weight: 800; display: inline-flex; align-items: center; gap: 10px; color: white; transition: 0.3s; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>YMTEA Labs 全球诊断专家</h1>
        <p>独立站 SEO 深度审计 & AI 搜索 (GEO) 性能基准测试</p>
    </div>
</header>

<div class="container">
    <div class="search-section">
        <div class="search-controls">
            <input type="url" id="siteUrl" placeholder="输入待诊断网址，例如 www.ymtea.club">
            <button id="auditBtn" onclick="runAudit()">启动行业级审计</button>
        </div>
        <!-- 恢复链接入口 -->
        <div class="sub-nav">
            <a href="https://vip.ymtea.club" target="_blank">云茗荟VIP智库</a>
            <a href="https://www.ymtea.club" target="_blank">Ymtea Shop全球店</a>
        </div>
    </div>

    <div id="progressContainer">
        <div class="progress-bar-bg"><div id="progressBarFill"></div></div>
        <p id="statusText">正在初始化全网链路诊断...</p>
    </div>

    <div id="reportSection">
        <div class="report-grid">
            <div class="card"><div class="label">SEO & GEO 评分</div><span id="geoScore" class="score-val">--</span></div>
            <div class="card"><div class="label">首屏加载 (LCP)</div><span id="lcpVal" class="score-val">--</span></div>
            <div class="card"><div class="label">页面总重</div><span id="weightVal" class="score-val">--</span></div>
            <div class="card"><div class="label">视觉稳定性 (CLS)</div><span id="clsVal" class="score-val">--</span></div>
        </div>

        <div class="geo-detail-box" style="border-top: 5px solid var(--danger);">
            <h3 style="margin-top:0;">⚡ 关键性能改进机会</h3>
            <div id="oppList"></div>
            <p id="ttfbText" style="font-size: 12px; color: #64748b; margin-top: 10px; font-family: monospace;"></p>
        </div>

        <div class="geo-detail-box">
            <h3 style="margin-top:0;">🤖 全球主流 AI 机器人准入检测</h3>
            <div class="bot-list" id="botList"></div>
        </div>

        <div class="advisor-section">
            <h2>联系 YMTEA 技术顾问</h2>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" class="btn-cta" style="background: #07c160;">微信咨询</a>
                <a href="https://wa.me/8618066947375" class="btn-cta" style="background: #25d366;">WhatsApp</a>
            </div>
        </div>
    </div>
</div>

<script>
    async function runAudit() {
        let urlValue = document.getElementById('siteUrl').value.trim();
        if(!urlValue) return alert('请输入网址');
        
        // 自动补充协议，防止因 URL 格式导致 Worker 报错
        if(!urlValue.startsWith('http')) urlValue = 'https://' + urlValue;

        const btn = document.getElementById('auditBtn');
        const report = document.getElementById('reportSection');
        const progress = document.getElementById('progressContainer');
        
        btn.disabled = true;
        report.style.display = 'none';
        progress.style.display = 'block';

        try {
            updateP(20, '正在连接 YMTEA 诊断节点...');
            updateP(50, '实时分析 Lighthouse 指标 (约 10-15s)...');

            const res = await fetch(`https://pi.ymtea.club/?url=${encodeURIComponent(urlValue)}`, {
                headers: { 'X-Auth-Token': 'YmTea_Labs_2026_Secure' }
            });
            
            if(!res.ok) throw new Error('Worker 响应异常');
            const data = await res.json();
            
            if(data.error) throw new Error(data.error);

            updateP(90, '正在生成 GEO 准入报告...');

            // 数据渲染
            document.getElementById('geoScore').innerText = data.seo || '--';
            document.getElementById('lcpVal').innerText = (data.lcp || '0') + 's';
            document.getElementById('weightVal').innerText = (data.totalByteWeight || '0') + ' KB';
            document.getElementById('clsVal').innerText = data.cls || '0';
            document.getElementById('ttfbText').innerText = `后端响应 (TTFB): ${data.ttfb || 'N/A'}`;

            // 机器人检测
            const botConfig = [
                { id: 'gpt', name: 'GPTBot (OpenAI)' },
                { id: 'claude', name: 'ClaudeBot' },
                { id: 'pplx', name: 'Perplexity AI' },
                { id: 'google', name: 'Google AI' }
            ];
            document.getElementById('botList').innerHTML = botConfig.map(bot => `
                <div class="bot-item">
                    ${bot.name} 
                    <span style="color: ${data.bots[bot.id] ? '#10b981' : '#ef4444'}">
                        ${data.bots[bot.id] ? '✅ 允许' : '❌ 已封禁'}
                    </span>
                </div>
            `).join('');

            // 改进机会
            const opps = data.opportunities || [];
            document.getElementById('oppList').innerHTML = opps.length > 0 ? opps.map(o => `
                <div class="opp-item"><span>💡 ${o.title}</span><span class="opp-savings">节省 ${o.displayValue}</span></div>
            `).join('') : '<p style="color:#10b981; font-weight:bold;">✅ 核心 Web 指标表现极佳，暂无改进建议</p>';

            progress.style.display = 'none';
            report.style.display = 'block';
        } catch (e) {
            console.error(e);
            alert('诊断失败: ' + (e.message || '网络连接超时'));
        } finally {
            btn.disabled = false;
            updateP(0, '');
        }
    }

    function updateP(p, t) {
        document.getElementById('progressBarFill').style.width = p + '%';
        document.getElementById('statusText').innerText = t;
    }
</script>
</body>
</html>
