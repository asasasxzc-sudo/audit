<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEO & 性能深度诊断 - YMTEA Labs</title>
    <style>
        :root {
            --primary: #c2410c; /* 统一 YMTEA 橙红色 */
            --secondary: #2c3e50;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--secondary);
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        .container { max-width: 1140px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center;
            padding: 50px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
        }

        header h1 { font-size: 2rem; margin: 0; letter-spacing: -1px; }
        header p { color: #64748b; margin-top: 10px; font-size: 0.95rem; }

        /* 搜索区域 */
        .search-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: -40px auto 40px;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .search-section { flex-direction: row; }
        }

        input[type="url"] {
            flex: 1;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input[type="url"]:focus { border-color: var(--primary); }

        #auditBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        #auditBtn:disabled { background: #94a3b8; cursor: wait; }

        /* 报告看板 */
        #reportSection { display: none; animation: slideUp 0.6s ease-out; }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary);
        }

        .score-val { font-size: 2.5rem; font-weight: 800; display: block; margin: 10px 0; }
        .label { color: #94a3b8; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* GEO 详情区 */
        .geo-detail-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-top: 20px;
            border: 1px solid #e2e8f0;
        }

        .bot-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .bot-item {
            padding: 12px;
            background: #f1f5f9;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
        }

        .llms-txt-area {
            background: #0f172a;
            color: #38bdf8;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            overflow-x: auto;
            position: relative;
            margin-top: 15px;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #334155;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>YMTEA Labs 独立站审计</h1>
        <p>全球首个整合 GEO (AI 搜索引擎优化) 与核心性能的诊断系统</p>
    </div>
</header>

<div class="container">
    <div class="search-section">
        <input type="url" id="siteUrl" placeholder="输入网址，例如 www.ymtea.club" required>
        <button id="auditBtn" onclick="runComprehensiveAudit()">开始深度审计</button>
    </div>

    <div id="reportSection">
        <div class="report-grid">
            <div class="card">
                <div class="label">性能评分</div>
                <span id="pScore" class="score-val">--</span>
            </div>
            <div class="card" style="border-top-color: #3b82f6;">
                <div class="label">GEO AI 引用潜力</div>
                <span id="gScore" class="score-val">--</span>
            </div>
            <div class="card">
                <div class="label">LCP (载入速度)</div>
                <span id="lcpVal" class="score-val" style="font-size: 1.8rem;">--</span>
            </div>
            <div class="card">
                <div class="label">语义段落达标率</div>
                <span id="semanticScore" class="score-val" style="font-size: 1.8rem;">--</span>
            </div>
        </div>

        <div class="geo-detail-box">
            <h3>🤖 AI 搜索引擎 (GEO) 兼容性矩阵</h3>
            <p style="color:#64748b; font-size: 14px;">检测网站是否允许主流 AI 爬虫抓取，并分析内容是否符合 AI 摘要提取习惯。</p>
            
            <div class="bot-list" id="botList">
                </div>

            <div id="geoAnalysis">
                </div>

            <div style="margin-top:30px;">
                <h4 style="margin-bottom:10px;">📄 自动生成 llms.txt (复制到根目录以提升 AI 识别)</h4>
                <div class="llms-txt-area">
                    <button class="copy-btn" onclick="copyLlms()">复制内容</button>
                    <pre id="llmsCode"># 正在生成...</pre>
                </div>
            </div>
        </div>

        <div style="text-align:center; margin: 40px 0;">
            <a href="https://wa.me/8618066947375" style="background:#25D366; color:#fff; padding:15px 30px; border-radius:50px; text-decoration:none; font-weight:bold; display:inline-block;">获取专家级 GEO 优化报告</a>
        </div>
    </div>
</div>

<script>
    async function runComprehensiveAudit() {
        const urlInput = document.getElementById('siteUrl');
        const btn = document.getElementById('auditBtn');
        const report = document.getElementById('reportSection');
        
        let targetUrl = urlInput.value.trim();
        if(!targetUrl) return alert('请输入有效网址');
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl;

        btn.innerText = '正在执行 GEO & 性能双向审计...';
        btn.disabled = true;
        report.style.display = 'none';

        const workerUrl = "https://pi.ymtea.club"; // 对应你的 Cloudflare Worker
        const SECRET_TOKEN = "YmTea_Labs_2026_Secure";

        try {
            const response = await fetch(`${workerUrl}/?url=${encodeURIComponent(targetUrl)}`, {
                method: 'GET',
                headers: { 'X-Auth-Token': SECRET_TOKEN }
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error);

            // 1. 渲染性能数据
            renderScore('pScore', data.perfScore);
            document.getElementById('lcpVal').innerText = data.lcp || "N/A";

            // 2. 渲染 GEO 数据
            const geoScore = data.geoScore || 85; // 假设后端返回或计算
            renderScore('gScore', geoScore);
            document.getElementById('semanticScore').innerText = (data.semanticReach || 0) + "%";

            // 3. 渲染爬虫矩阵
            const bots = data.bots || { gpt:true, claude:true, pplx:false, google:true };
            const botList = document.getElementById('botList');
            botList.innerHTML = `
                <div class="bot-item">GPTBot <span>${bots.gpt?'✅':'❌'}</span></div>
                <div class="bot-item">ClaudeBot <span>${bots.claude?'✅':'❌'}</span></div>
                <div class="bot-item">Perplexity <span>${bots.pplx?'✅':'❌'}</span></div>
                <div class="bot-item">Google-Extended <span>${bots.google?'✅':'❌'}</span></div>
            `;

            // 4. 生成 llms.txt
            const domain = new URL(targetUrl).hostname;
            document.getElementById('llmsCode').innerText = 
`# Site: ${domain}
# Description: High-quality Tea Wholesale & B2B Sourcing
# Context: Direct-from-farm Yunnan Black Tea
# Content-Rules: Prefer paragraphs between 134-167 words.
# Contact: ym@ymtea.club`;

            report.style.display = 'block';
            window.scrollTo({ top: report.offsetTop - 50, behavior: 'smooth' });

        } catch (error) {
            alert('审计中断: ' + error.message);
        } finally {
            btn.innerText = '开始深度审计';
            btn.disabled = false;
        }
    }

    function renderScore(id, score) {
        const elem = document.getElementById(id);
        elem.innerText = Math.round(score);
        const color = score < 60 ? "#ef4444" : (score >= 90 ? "#10b981" : "#f59e0b");
        elem.style.color = color;
    }

    function copyLlms() {
        const code = document.getElementById('llmsCode').innerText;
        navigator.clipboard.writeText(code);
        alert('llms.txt 内容已复制');
    }
</script>

</body>
</html>
