<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>独立站深度诊断 - YMTEA Labs 安全加固版</title>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2c3e50;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--secondary);
            margin: 0; padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center;
            padding: 40px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        header h1 { font-size: 1.8rem; margin: 0 0 10px 0; color: var(--secondary); }
        header p { font-size: 1rem; color: #7f8c8d; }

        /* 搜索区域 */
        .search-section {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: -30px auto 30px;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .search-section { flex-direction: row; padding: 35px; margin-top: -40px; }
            header h1 { font-size: 2.5rem; }
        }

        input[type="url"] {
            flex: 1;
            padding: 16px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="url"]:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1); }

        button#auditBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button#auditBtn:disabled { background: #cbd5e0; cursor: not-allowed; }

        /* 结果展示 */
        #reportSection { display: none; margin-top: 20px; animation: fadeInUp 0.6s ease; }

        .report-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 480px) { .report-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .report-grid { grid-template-columns: repeat(4, 1fr); } }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-bottom: 4px solid var(--primary);
        }

        .score-val { font-size: 2.5rem; font-weight: 800; margin: 10px 0; display: block; color: var(--primary); }
        .label { color: #a0aec0; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }

        /* 联系方式 */
        .solution-box {
            background: white;
            padding: 35px 20px;
            border-radius: 16px;
            margin-top: 40px;
            text-align: center;
            border: 2px dashed #e2e8f0;
        }

        .contact-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        @media (min-width: 768px) {
            .contact-group { flex-direction: row; justify-content: center; gap: 20px; }
        }

        .contact-btn {
            padding: 14px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            display: block;
            transition: opacity 0.3s;
        }

        .btn-wechat { background: #07C160; }
        .btn-whatsapp { background: #25D366; }
        .btn-email { background: #3498db; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>独立站深度诊断</h1>
        <p>YMTEA 助力 B2B 品牌出海技术优化</p>
    </div>
</header>

<div class="container">
    <div class="search-section">
        <input type="url" id="siteUrl" placeholder="输入您的网址 https://..." required>
        <button id="auditBtn" onclick="runCheck()">立即分析</button>
    </div>

    <div id="reportSection">
        <div class="report-grid">
            <div class="card">
                <div class="label">性能评分</div>
                <span id="pScore" class="score-val">--</span>
            </div>
            <div class="card">
                <div class="label">SEO 评分</div>
                <span id="sScore" class="score-val">--</span>
            </div>
            <div class="card">
                <div class="label">LCP 耗时</div>
                <span id="lcp" class="score-val" style="font-size: 1.8rem;">--</span>
            </div>
            <div class="card">
                <div class="label">主线程占用</div>
                <span id="mt" class="score-val" style="font-size: 1.8rem;">--</span>
            </div>
        </div>

        <div class="solution-box">
            <h2>🚀 获取完整优化方案</h2>
            <p>发现指标异常？联系我们获取代码级修改建议</p>
            <div class="contact-group">
                <a href="https://work.weixin.qq.com/kfid/kfcab9eba83e85cde3e" class="contact-btn btn-wechat" target="_blank">微信咨询</a>
                <a href="https://wa.me/8618066947375" class="contact-btn btn-whatsapp" target="_blank">WhatsApp</a>
                <a href="mailto:ym@ymtea.club" class="contact-btn btn-email">Email</a>
            </div>
        </div>
    </div>
</div>

<script>
    async function runCheck() {
        const urlInput = document.getElementById('siteUrl');
        const btn = document.getElementById('auditBtn');
        const report = document.getElementById('reportSection');
        
        if(!urlInput.value || !urlInput.value.startsWith('http')) {
            alert('请输入完整的网址，包含 https://');
            return;
        }
        
        btn.innerText = '诊断中 (预计20-40s)...';
        btn.disabled = true;
        report.style.display = 'none';

        // --- 安全配置 ---
        // 必须与 Worker 中的 SECRET_TOKEN 一致
        const SECRET_TOKEN = "YmTea_Labs_2026_Secure"; 
        // 替换为你真实的 Worker 路由或地址
        const workerUrl = `https://audit.ymtea.club/?url=${encodeURIComponent(urlInput.value)}`;

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);

            const response = await fetch(workerUrl, {
                method: 'GET',
                headers: {
                    // 发送安全暗号给后端校验
                    'X-Auth-Token': SECRET_TOKEN 
                },
                signal: controller.signal
            });

            if (response.status === 403) {
                throw new Error('权限拒绝：域名不匹配或暗号错误');
            }

            const data = await response.json();
            clearTimeout(timeoutId);

            if(data.error) {
                alert('诊断异常: ' + data.error);
                return;
            }

            // 填充数据逻辑
            const ps = Math.round(data.perfScore);
            const psElem = document.getElementById('pScore');
            psElem.innerText = ps;
            psElem.style.color = ps < 50 ? "#e74c3c" : (ps < 90 ? "#f39c12" : "#27ae60");

            document.getElementById('sScore').innerText = Math.round(data.seoScore);
            document.getElementById('lcp').innerText = data.lcp;
            document.getElementById('mt').innerText = data.mainThread;

            report.style.display = 'block';
            window.scrollTo({ top: report.offsetTop - 50, behavior: 'smooth' });

        } catch (error) {
            alert('错误: ' + error.message);
        } finally {
            btn.innerText = '立即分析';
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
